# Lints the worktree mechanics scripts. These are load-bearing
# (DESIGN §6) but small, so the built-in shellcheck on the runner is
# sufficient — no third-party action needed.
name: shellcheck

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**/*.sh'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**/*.sh'
      - '.github/workflows/shellcheck.yml'

concurrency:
  group: shellcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: shellcheck version
        run: shellcheck --version

      - name: Run shellcheck on scripts/
        run: shellcheck -x scripts/*.sh

      - name: Summary
        if: always()
        run: |
          {
            echo "### shellcheck"
            echo "- Ran \`shellcheck -x scripts/*.sh\`"
            echo "- Status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
